<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Planning - TvAbdou</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    * { box-sizing: border-box; }
    body { 
        /* Application du dégradé exact de l'image 1 */
        background: linear-gradient(135deg, #c7b3e0 0%, #C9BCF1 100%); 
        color: #333; /* Texte sombre pour la lisibilité sur fond clair */
        font-family: 'Arial', sans-serif; 
        margin: 0; padding: 20px;
        display: flex; flex-direction: column; align-items: center;
        min-height: 100vh;
        position: relative;
    }

    #particles { display: none; } /* Désactivé pour coller au design épuré */

    h1 {
        font-size: 3rem; text-transform: uppercase; margin: 20px 0;
        color: #4a3a60; text-shadow: none;
    }

    .social-icons {
        display: flex; gap: 25px; margin-bottom: 25px;
    }
    .social-icon { font-size: 2rem; color: #4a3a60; text-decoration: none; }

    .top-info { width: 95%; max-width: 1400px; text-align: center; margin-bottom: 20px; }
    #countdown-text { font-size: 1.2rem; color: #4a3a60; font-weight: bold; margin-bottom: 10px; }

    #live-link {
        display: none; background-color: #9146FF; color: white;
        text-decoration: none; padding: 10px 25px; border-radius: 8px; font-weight: bold;
    }

    .grid {
        display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px;
        width: 95%; max-width: 1400px;
    }

    .day-column {
        background: rgba(255, 255, 255, 0.4); /* Fond semi-transparent clair */
        border: 1px solid rgba(138, 111, 176, 0.3);
        border-radius: 10px; text-align: center; min-height: 500px;
        display: flex; flex-direction: column;
    }

    .day-header { padding: 15px; border-bottom: 1px solid rgba(138, 111, 176, 0.2); }
    .day-header h3 { margin: 0; color: #4a3a60; font-size: 1rem; }
    
    .rest-badge {
        color: #4a3a60; font-weight: bold; margin-top: 50px;
        text-transform: uppercase;
    }

    .live-badge { background: #ff0000; color: white; padding: 2px 8px; border-radius: 4px; }

    @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>
    <h1>Planning</h1>
    
    <div class="social-icons">
        <a href="https://www.twitch.tv/tvabdou" target="_blank" class="social-icon"><i class="fa-brands fa-twitch"></i></a>
        <a href="https://discord.com/invite/Pz7bmEyj6m" target="_blank" class="social-icon"><i class="fa-brands fa-discord"></i></a>
    </div>
    
    <div class="top-info">
        <a href="https://www.twitch.tv/tvabdou" target="_blank" id="live-link">🔴 REJOINDRE LE LIVE</a>
        <div id="countdown-text">Calcul du prochain stream...</div>
    </div>

    <div class="grid" id="planning-grid"></div>

<script>
    // Configuration identique au design demandé
    const planning = {
        "Lundi": [], "Mardi": [], 
        "Mercredi": [{ image: "https://i.imgur.com/v2VGGE3.jpeg", heure: "20H30" }], 
        "Jeudi": [], "Vendredi": [], "Samedi": [], "Dimanche": []
    };

    const grid = document.getElementById('planning-grid');
    const joursOrdre = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
    
    joursOrdre.forEach(jour => {
        const col = document.createElement('div');
        col.className = 'day-column';
        
        const sessions = planning[jour] || [];
        const content = sessions.length > 0 ? 
            sessions.map(s => `<div style="padding:10px;"><b>${s.heure}</b></div>`).join('') : 
            '<div class="rest-badge">Repos</div>';

        col.innerHTML = `
            <div class="day-header"><h3>${jour}</h3></div>
            <div class="day-body">${content}</div>
        `;
        grid.appendChild(col);
    });
</script>
</body>
</html>
