<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Planning - TvAbdou</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #2a0505 0%, #000000 100%); 
            color: #ffffff; 
            font-family: 'Arial', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 {
            font-size: 4rem; text-transform: uppercase; margin: 40px 0;
            cursor: pointer; transition: all 0.4s ease;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }
        h1:hover { text-shadow: 0 0 25px #ff4d4d; transform: scale(1.05); }

        /* Conteneur des colonnes - toujours 7 colonnes sur une ligne */
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px;
            width: 95%;
            max-width: 1400px;
            margin-top: 20px;
        }

        .day-column {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 77, 77, 0.3);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            min-height: 500px; /* colonnes hautes en vertical */
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .day-column:hover {
            border-color: #ff4d4d;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
        }

        .day-column h3 { 
            margin-bottom: 15px; 
            color: #ff4d4d; 
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255, 77, 77, 0.3);
            padding-bottom: 10px;
        }

        .day-content {
            flex: 1;
            color: #cccccc;
        }

        /* Responsive : sur petit écran, on repasse en colonnes qui s'empilent */
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            }
            .day-column { min-height: 300px; }
        }
    </style>
</head>
<body>
    <h1>Planning</h1>
    <div class="grid">
        <div class="day-column"><h3>Lundi</h3><div class="day-content">...</div></div>
        <div class="day-column"><h3>Mardi</h3><div class="day-content">...</div></div>
        <div class="day-column"><h3>Mercredi</h3><div class="day-content">...</div></div>
        <div class="day-column"><h3>Jeudi</h3><div class="day-content">...</div></div>
        <div class="day-column"><h3>Vendredi</h3><div class="day-content">...</div></div>
        <div class="day-column"><h3>Samedi</h3><div class="day-content">...</div></div>
        <div class="day-column"><h3>Dimanche</h3><div class="day-content">...</div></div>
    </div>
</body>
</html>
