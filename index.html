<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Planning - TvAbdou</title>
<style>
    * { box-sizing: border-box; }
    body { 
        background: radial-gradient(circle at center, #2a0505 0%, #000000 100%); 
        color: #ffffff; 
        font-family: 'Arial', sans-serif; 
        margin: 0; padding: 20px;
        display: flex; flex-direction: column; align-items: center;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
    }

    #particles {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }
    .particle {
        position: absolute;
        bottom: -10px;
        background: rgba(255, 77, 77, 0.6);
        border-radius: 50%;
        box-shadow: 0 0 6px rgba(255, 77, 77, 0.6);
        animation: floatUp linear infinite;
    }
    @keyframes floatUp {
        0% { transform: translateY(0) translateX(0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-110vh) translateX(var(--drift)); opacity: 0; }
    }

    h1 {
        font-size: 4rem; text-transform: uppercase; margin: 40px 0;
        cursor: pointer; transition: all 0.4s ease;
        text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        position: relative; z-index: 1;
    }
    h1:hover { text-shadow: 0 0 25px #ff4d4d; transform: scale(1.05); }

    .grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 12px;
        width: 95%;
        max-width: 1400px;
        margin-top: 20px;
        position: relative;
        z-index: 1;
    }

    .day-column {
        background: #0d0505;
        border: 1px solid rgba(255, 77, 77, 0.3);
        border-radius: 10px;
        text-align: center;
        min-height: 560px;
        display: flex;
        flex-direction: column;
        transition: all 0.3s ease;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeIn 0.5s ease forwards;
        overflow: hidden;
        position: relative;
    }

    .day-column:nth-child(1) { animation-delay: 0.05s; }
    .day-column:nth-child(2) { animation-delay: 0.1s; }
    .day-column:nth-child(3) { animation-delay: 0.15s; }
    .day-column:nth-child(4) { animation-delay: 0.2s; }
    .day-column:nth-child(5) { animation-delay: 0.25s; }
    .day-column:nth-child(6) { animation-delay: 0.3s; }
    .day-column:nth-child(7) { animation-delay: 0.35s; }

    @keyframes fadeIn {
        to { opacity: 1; transform: translateY(0); }
    }

    .day-column:hover {
        border-color: #ff4d4d;
        box-shadow: 0 0 18px rgba(255, 77, 77, 0.35);
        transform: translateY(-4px);
    }

    .day-column.today {
        border-color: #ff4d4d;
        box-shadow: 0 0 22px rgba(255, 77, 77, 0.3);
    }

    .day-header {
        padding: 14px 8px 10px;
        background: rgba(255, 77, 77, 0.08);
        border-bottom: 1px solid rgba(255, 77, 77, 0.25);
    }

    .day-header h3 {
        margin: 0;
        color: #ff4d4d;
        font-size: 1.05rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .today-badge {
        display: block;
        font-size: 0.6rem;
        background: #ff4d4d;
        color: #000;
        padding: 2px 10px;
        border-radius: 10px;
        margin: 6px auto 0;
        width: fit-content;
        font-weight: bold;
    }

    .day-visual {
        flex: 1;
        position: relative;
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: flex-end;
        min-height: 400px;
    }

    .day-visual.no-image {
        background: linear-gradient(180deg, rgba(255,77,77,0.05) 0%, rgba(0,0,0,0.3) 100%);
        align-items: center;
        justify-content: center;
    }

    .day-visual::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 55%;
        background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 100%);
        pointer-events: none;
    }

    .time-badge {
        position: relative;
        z-index: 2;
        width: 100%;
        padding: 12px 6px;
        font-size: 1.2rem;
        font-weight: bold;
        color: #fff;
        text-shadow: 0 0 10px rgba(255,77,77,0.8);
        letter-spacing: 1px;
    }

    .rest-badge {
        border: 1px solid rgba(255, 77, 77, 0.5);
        color: #ff4d4d;
        padding: 8px 18px;
        border-radius: 6px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: bold;
        text-shadow: 0 0 8px rgba(255, 77, 77, 0.6);
    }

    @media (max-width: 900px) {
        .grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
        .day-column { min-height: 380px; }
        .day-visual { min-height: 260px; }
        h1 { font-size: 2.5rem; }
    }
</style>
</head>
<body>
    <div id="particles"></div>
    <h1>Planning</h1>
    <div class="grid" id="planning-grid"></div>

<script>
    // ✏️ MODIFIE UNIQUEMENT CETTE PARTIE CHAQUE SEMAINE ✏️
    // image : URL de l'image (ou null si repos)
    // heure : ex "20H30" (laisse "" si pas d'heure précise -> affiche "Bientôt")
    const planning = {
        "Lundi":    { image: null, heure: "" },
        "Mardi":    { image: null, heure: "" },
        "Mercredi": { image: "https://i.imgur.com/v2VGGE3.jpeg", heure: "20H30" },
        "Jeudi":    { image: "https://i.imgur.com/O5kzzh3.jpeg", heure: "" },
        "Vendredi": { image: null, heure: "" },
        "Samedi":   { image: null, heure: "" },
        "Dimanche": { image: null, heure: "" }
    };
    // ✏️ FIN DE LA PARTIE À MODIFIER ✏️

    const grid = document.getElementById('planning-grid');
    const jsDay = new Date().getDay();
    const joursOrdre = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
    const todayName = joursOrdre[jsDay];

    Object.keys(planning).forEach(jour => {
        const { image, heure } = planning[jour];
        const col = document.createElement('div');
        col.className = 'day-column' + (jour === todayName ? ' today' : '');

        const visualStyle = image ? `style="background-image: url('${image}')"` : '';
        const visualClass = image ? 'day-visual' : 'day-visual no-image';

        let innerContent;
        if (image) {
            innerContent = `<div class="time-badge">${heure ? heure : 'Bientôt'}</div>`;
        } else {
            innerContent = `<div class="rest-badge">Repos</div>`;
        }

        col.innerHTML = `
            <div class="day-header">
                <h3>${jour}</h3>
                ${jour === todayName ? '<span class="today-badge">Aujourd\'hui</span>' : ''}
            </div>
            <div class="${visualClass}" ${visualStyle}>
                ${innerContent}
            </div>
        `;
        grid.appendChild(col);
    });

    // Particules flottantes en fond
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 1;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px');
        p.style.animationDuration = (Math.random() * 10 + 8) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        particlesContainer.appendChild(p);
    }
</script>
</body>
</html>
